<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BOOKSHARE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="index.html" class="back-link">← Back</a>
                <h2>Welcome Back </h2>
                <p>Login to start buying and selling books</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                </div>

                <div class="forgot-pass">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="login-submit">Login</button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // ૧. ઇનપુટ કરેલી વિગતો મેળવો
            const emailInput = document.getElementById('loginEmail').value;
            const passInput = document.getElementById('loginPassword').value;

            // ૨. Signup વખતે સ્ટોર થયેલો ડેટા મેળવો
            const savedEmail = localStorage.getItem('registeredEmail');
            const savedPass = localStorage.getItem('registeredPassword');

            // ૩. વિગતો ચેક કરો
            if (emailInput === savedEmail && passInput === savedPass) {
                alert("Login Successful! 🔓");
                
                // લોગિન સ્ટેટસ સાચવો
                localStorage.setItem('isLoggedIn', 'true'); 
                
                // હોમ પેજ પર મોકલો
                window.location.href = "index.html";
            } else {
                alert("Invalid email or password! Please check and try again.");
            }
        });
    </script>
<script src="theme.js"></script>
</body>
</html>
