
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Book | BOOKSHARE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="upload-body">

    <nav class="navbar">
        <div class="logo" style="display: flex; align-items: center;">
            <img src="c:\Users\Krutika Borsaniya\Pictures\bookshare1.jpeg" alt="Logo" class="nav-logo" style="height: 40px; margin-right: 12px; border-radius: 8px;">
            <span style="color: #582C83 !important; font-weight: 800 !important; font-size: 26px !important; display: inline-block; font-family: sans-serif;">BOOKSHARE</span>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">My Profile</a>
            <a href="login.html" class="login-btn" style="color: #ffffff !important; background-color: #582C83 !important; padding: 10px 25px !important; border-radius: 12px !important; text-decoration: none !important; font-weight: 700 !important; margin-left: 15px; display: inline-block;">My Account</a>
            <button onclick="toggleDarkMode()" id="darkModeBtn" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; margin-right: 15px;">🌙</button>
        </div>
    </nav>

    <div class="upload-container" style="margin-top: 100px;">
        <div class="upload-header">
            <h2>List Your Book</h2>
            <p>Fill in the details to find a buyer quickly</p>
        </div>

        <form class="upload-form" id="bookForm" onsubmit="uploadBook(event)">
            <div class="image-upload-box" style="text-align: center; border: 2px dashed #582C83; padding: 20px; border-radius: 15px;">
    <input type="file" id="book-img" hidden onchange="previewImage(event)" accept="image/*">
    
    <label for="book-img" class="upload-label" style="cursor: pointer;">
        <span class="upload-icon" style="font-size: 2.5rem;">📸</span>
        <p style="font-weight: 800; color: #582C83; margin-top: 10px;">Click to Upload Book Cover</p>
    </label>
    
    <div id="preview-container" style="margin-top: 20px; display: none;">
        <img id="image-preview" src="#" alt="Selected Image" 
             style="width: 100%; max-width: 180px; border-radius: 12px; border: 3px solid #582C83; padding: 5px; box-shadow: 0 8px 20px rgba(88,44,131,0.2);">
        <p style="color: #ff4757; font-size: 0.9rem; font-weight: 800; cursor: pointer; margin-top: 15px;" onclick="removeImage()">
            ✕ Remove & Change
        </p>
    </div>
</div>
            <div class="form-grid">
                <div class="input-group">
                    <label>Book Title</label>
                    <input type="text" id="title" placeholder="e.g. 12th Physics NCERT" required>
                </div>

                <div class="input-group">
                    <label>Category</label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="commerce">Commerce</option>
                        <option value="science">Science</option>
                        <option value="engineering">Engineering</option>
                        <option value="school">School</option>
                        <option value="exam">Exam Preparation</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Price (₹)</label>
                    <input type="number" id="price" placeholder="Enter price (0 for Free)" required>
                </div>

                <div class="input-group">
                    <label>City / Location</label>
                    <input type="text" id="location" placeholder="e.g. Rajkot, Gujarat" required>
                </div>

                <div class="input-group">
                    <label>Book Condition</label>
                    <select id="book-condition" style="width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc;" required>
                        <option value="5">⭐⭐⭐⭐⭐ (Like New)</option>
                        <option value="4">⭐⭐⭐⭐ (Good)</option>
                        <option value="3">⭐⭐⭐ (Average)</option>
                        <option value="2">⭐⭐ (Old)</option>
                        <option value="1">⭐ (Rough)</option>
                    </select>
                </div>
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label>WhatsApp Number</label>
                <input type="tel" id="whatsapp" placeholder="Enter your WhatsApp number" required>
            </div>

            <div class="input-group" style="margin-top: 15px;">
                <label>Short Description (Optional)</label>
                <textarea id="description" rows="3" placeholder="Edition year, etc."></textarea>
            </div>

            <button type="submit" class="upload-submit" style="background: #582C83;">Post Listing Now</button>
        </form>
    </div>

    <script src="theme.js"></script>
    <script src="logic.js"></script>
</body>
</html>
